{% extends "base.html" %}
{% load static %}
{% block title %}Giriş Yap{% endblock %}

{% block content %}
<style>
  .auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 150px);
  }

  .auth-card {
    width: 100%;
    max-width: 450px;
    padding: 40px;
    text-align: center;
  }

  .form-group {
    text-align: left;
    margin-bottom: 20px;
  }

  label {
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
    color: var(--text-dark);
  }

  input {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.1);
    background: rgba(255,255,255,0.6);
    font-size: 1rem;
    transition: 0.3s;
    box-sizing: border-box;
  }

  input:focus {
    outline: none;
    border-color: var(--primary);
    background: white;
    box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
  }

  button {
    width: 100%;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
  }

  .bottom-text {
    margin-top: 20px;
    font-size: 0.9rem;
    color: var(--text-gray);
  }

  .bottom-text a {
    color: var(--primary);
    font-weight: 600;
  }

  .msg { margin-top: 15px; font-weight: 600; font-size: 0.95rem; }
</style>

<div class="auth-wrapper">
  <div class="glass auth-card">
    <div style="font-size: 3rem; margin-bottom: 10px;">👋</div>
    <h2 style="margin-bottom: 30px; color: var(--text-dark);">Tekrar Hoşgeldin!</h2>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Kullanıcı Adı</label>
        <input type="text" id="username" placeholder="Kullanıcı adın" required>
      </div>
      <div class="form-group">
        <label for="password">Şifre</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit">Giriş Yap</button>
    </form>

    <p id="msg" class="msg"></p>

    <div class="bottom-text">
      Hesabın yok mu? <a href="{% url 'register' %}">Kayıt Ol</a> <br><br>
      <a href="{% url 'password_reset' %}" style="color: var(--text-gray); font-size: 0.85rem;">Şifremi Unuttum</a>
    </div>
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const msg = document.getElementById('msg');
  msg.style.color = '#666';
  msg.innerText = '⏳ Giriş yapılıyor...';

  try {
    // 1. Token Al
    const res = await fetch('/api/auth/token/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem('access', data.access);
      localStorage.setItem('refresh', data.refresh);

      // 2. Session Başlat (Django girişi)
      await fetch('/api/auth/session-login/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      msg.style.color = '#34C759';
      msg.innerText = '✅ Giriş başarılı! Yönlendiriliyorsunuz...';
      setTimeout(() => window.location.href='/dashboard/', 1000);
    } else {
      msg.style.color = '#FF3B30';
      msg.innerText = '⚠️ ' + (data.detail || 'Kullanıcı adı veya şifre hatalı.');
    }
  } catch (err) {
    msg.style.color = '#FF3B30';
    msg.innerText = '⚠️ Sunucu hatası, lütfen tekrar deneyin.';
  }
});
</script>
{% endblock %}
