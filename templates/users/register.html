{% extends "base.html" %}
{% load static %}
{% block title %}Kayıt Ol{% endblock %}

{% block content %}
<style>
  .auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 150px);
  }

  .auth-card {
    width: 100%;
    max-width: 450px;
    padding: 40px;
    text-align: center;
  }

  .form-group { text-align: left; margin-bottom: 20px; }

  label { font-weight: 600; margin-bottom: 8px; display: block; color: var(--text-dark); }

  input, select {
    width: 100%; padding: 14px; border-radius: 12px;
    border: 1px solid rgba(0,0,0,0.1); background: rgba(255,255,255,0.6);
    font-size: 1rem; transition: 0.3s; box-sizing: border-box;
  }

  input:focus, select:focus {
    outline: none; border-color: var(--primary);
    background: white; box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.1);
  }

  button {
    width: 100%; background: var(--primary); color: white;
    border: none; border-radius: 12px; padding: 14px;
    font-weight: 700; font-size: 1rem; cursor: pointer;
    transition: 0.3s; margin-top: 10px;
  }

  button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3); }

  .bottom-text { margin-top: 20px; font-size: 0.9rem; color: var(--text-gray); }
  .bottom-text a { color: var(--primary); font-weight: 600; }
  .msg { margin-top: 15px; font-weight: 600; font-size: 0.95rem; }
</style>

<div class="auth-wrapper">
  <div class="glass auth-card">
    <div style="font-size: 3rem; margin-bottom: 10px;">🚀</div>
    <h2 style="margin-bottom: 10px; color: var(--text-dark);">Aramıza Katıl!</h2>

    <form id="registerForm">
      <div class="form-group">
        <label>Kullanıcı Adı (Sadece harf ve rakam)</label>
        <input type="text" id="username" placeholder="Örn: ogrenci123" required>
      </div>
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="email" placeholder="ornek@email.com" required>
      </div>

      <!-- Üniversite Seçimi (Django'dan geliyor) -->
      <div class="form-group">
        <label>Üniversite (İsteğe Bağlı)</label>
        <select id="university">
            <option value="">Seçiniz...</option>
            {% for uni in universities %}
                <option value="{{ uni.id }}">{{ uni.name }}</option>
            {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Şifre (En az 8 karakter)</label>
        <input type="password" id="password" placeholder="Güçlü bir şifre" required>
      </div>
      <button type="submit">Kayıt Ol</button>
    </form>

    <p id="msg" class="msg"></p>
    <p class="bottom-text">Zaten hesabın var mı? <a href="{% url 'login' %}">Giriş Yap</a></p>
  </div>
</div>

<script>
// Kayıt İşlemi
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const university = document.getElementById('university').value;
  const msg = document.getElementById('msg');

  msg.style.color = '#666';
  msg.innerText = '⏳ Kayıt yapılıyor...';

  try {
    const res = await fetch('/api/auth/register/', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ username, email, password, university })
    });
    const data = await res.json();

    if (res.ok) {
      msg.style.color = '#34C759';
      msg.innerText = '✅ Kayıt başarılı! Aktivasyon mailini kontrol et.';
      e.target.reset();
    } else {
      msg.style.color = '#FF3B30';
      // Detaylı Hata Gösterimi
      let errorMsg = "Hata oluştu.";
      if(data.username) errorMsg = data.username[0];
      else if(data.email) errorMsg = data.email[0];
      else if(data.password) errorMsg = data.password[0];
      else if(data.detail) errorMsg = data.detail;

      msg.innerText = '⚠️ ' + errorMsg;
    }
  } catch { msg.innerText = '⚠️ Sunucu hatası.'; }
});
</script>
{% endblock %}
