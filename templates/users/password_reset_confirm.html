{% extends "base.html" %}
{% block title %}Yeni Şifre Belirle{% endblock %}
{% block content %}
<style>
.auth-box{max-width:400px;margin:80px auto;background:#fff;padding:2rem;border-radius:16px;box-shadow:0 4px 15px rgba(0,0,0,0.08);text-align:center;}
input{width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;margin-bottom:1rem;}
button{width:100%;background:linear-gradient(135deg,#00205B,#001540);color:#fff;border:none;border-radius:8px;padding:10px;cursor:pointer;}
.msg{margin-top:1rem;}
</style>

<div class="auth-box">
  <h2>🔑 Yeni Şifre Belirle</h2>
  <form id="confirmForm">
    <input type="password" id="password" placeholder="Yeni Şifre" required>
    <button type="submit">Şifreyi Güncelle</button>
  </form>
  <p id="msg" class="msg"></p>
</div>

<script>
const params=new URLSearchParams(window.location.search);
const uid = "{{ uid }}";
const token = "{{ token }}";
document.getElementById("confirmForm").addEventListener("submit",async(e)=>{
  e.preventDefault();
  const password=document.getElementById("password").value;
  const msg=document.getElementById("msg");
  msg.style.color="#555";msg.innerText="⏳ Güncelleniyor...";
  try{
    const res=await fetch("/api/auth/password/reset/confirm/",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({uid,token,password})
    });
    const data=await res.json();
    if(res.ok){
      msg.style.color="green";
      msg.innerText="✅ Şifre başarıyla güncellendi.";
      setTimeout(()=>window.location.href="/login/",1500);
    }else{
      msg.style.color="red";
      msg.innerText="⚠️ "+(data.error||"Bağlantı geçersiz.");
    }
  }catch{msg.style.color="red";msg.innerText="⚠️ Sunucu hatası.";}
});
</script>
{% endblock %}
