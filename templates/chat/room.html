{% extends "base.html" %}
{% block title %}Sohbet Odası{% endblock %}
{% block content %}
<style>
    .chat-container { height: 70vh; display: flex; flex-direction: column; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 20px; background: rgba(255,255,255,0.5); border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.5); }
    .message { margin-bottom: 15px; display: flex; flex-direction: column; }
    .message.mine { align-items: flex-end; }
    .msg-bubble { background: white; padding: 10px 15px; border-radius: 12px; max-width: 70%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .message.mine .msg-bubble { background: var(--primary); color: white; }
    .msg-info { font-size: 0.75rem; color: #888; margin-top: 4px; }
    .chat-input-area { display: flex; gap: 10px; }
</style>

<div class="glass" style="padding: 20px; max-width: 800px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px; color: var(--text-dark);">💬 Kampüs Sohbeti</h2>

    <div class="chat-container">
        <div class="chat-messages" id="chatBox">
            <!-- Mesajlar Buraya Gelecek -->
        </div>

        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Bir şeyler yaz..." style="flex:1;">
            <button onclick="sendMessage()" style="background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 12px; cursor: pointer;">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chatBox');

    async function loadMessages() {
        try {
            const res = await fetch('/chat/get/');
            const data = await res.json();
            const currentHTML = chatBox.innerHTML;

            let newHTML = data.messages.map(m => `
                <div class="message ${m.user === '{{ user.username }}' ? 'mine' : ''}">
                    <div class="msg-bubble">
                        <strong style="font-size:0.8rem; display:block; margin-bottom:2px;">${m.user}</strong>
                        ${m.message}
                    </div>
                    <span class="msg-info">${m.created_at}</span>
                </div>
            `).join('');

            // Sadece değişiklik varsa güncelle (Basit kontrol)
            if (chatBox.childElementCount !== data.messages.length) {
                chatBox.innerHTML = newHTML;
                chatBox.scrollTop = chatBox.scrollHeight; // En alta kaydır
            }
        } catch(e) {}
    }

    async function sendMessage() {
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if(!text) return;

        await fetch('/chat/send/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token }}'
            },
            body: JSON.stringify({ message: text })
        });

        input.value = '';
        loadMessages();
    }

    // Her 3 saniyede bir mesajları yenile (Basit Polling)
    setInterval(loadMessages, 3000);
    loadMessages();
</script>
{% endblock %}
