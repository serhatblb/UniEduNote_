{% extends "base.html" %}
{% block title %}Notu Düzenle{% endblock %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div class="glass" style="padding: 30px;">
        <h2 style="color: var(--primary); margin-bottom: 20px;"><i class="fa-solid fa-pen-to-square"></i> Notu Düzenle</h2>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <div style="margin-bottom: 15px;">
                <label style="display:block; font-weight:600; margin-bottom:5px;">Başlık</label>
                <input type="text" name="title" value="{{ note.title }}" required
                       style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; background:rgba(255,255,255,0.5);">
            </div>

            <div style="margin-bottom: 15px;">
                <label style="display:block; font-weight:600; margin-bottom:5px;">Açıklama</label>
                <textarea name="description" rows="4"
                          style="width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; background:rgba(255,255,255,0.5);">{{ note.description }}</textarea>
            </div>

            <div style="margin-bottom: 20px;">
                <label style="display:block; font-weight:600; margin-bottom:5px;">Yeni Dosya (İsteğe Bağlı)</label>
                <input type="file" name="file" style="width:100%;">
            </div>

            <div style="display:flex; gap:10px;">
                <button type="submit" style="flex:1; background:var(--primary); color:white; padding:12px; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">
                    Kaydet
                </button>
                <a href="{% url 'note_detail' note.id %}" style="flex:1; background:#ddd; color:#333; padding:12px; border-radius:12px; font-weight:bold; text-align:center; text-decoration:none;">
                    İptal
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
